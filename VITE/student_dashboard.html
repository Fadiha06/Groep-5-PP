<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — EhB StageTool</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/VITE/src/CSS/student_dashboard.css">
</head>
<body>
<div class="root">

  <nav class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-title">EhB StageTool</div>
      <div class="sb-logo-sub">Toegepaste Informatica</div>
    </div>
    <div class="sb-nav">
      <a class="sb-item active" href="student_dashboard.html">Dashboard</a>
      <a class="sb-item" href="logboek.html">Logboek</a>
      <a class="sb-item" href="evaluaties.html">Evaluaties</a>
    </div>
    <div class="sb-footer">Ingelogd als Student</div>
  </nav>

  <div class="main">

    <div class="page-header">
      <div class="page-title" id="welkom-naam">Welkom</div>
      <button class="btn-uitloggen">Uitloggen</button>
    </div>

    <div class="next-banner">
      <div class="next-banner-title" id="banner-week">Volgende stap: logboek indienen</div>
      <div class="next-banner-sub">Vul je logboek in voor deze week</div>
    </div>

    <div class="metrics">
      <div class="metric-card">
        <div class="metric-label">Stagedagen</div>
        <div class="metric-value" id="stat-stagedagen-value">—</div>
        <div class="metric-bar-wrap"><div class="metric-bar bar-blue" id="stat-stagedagen-bar" style="width:0%"></div></div>
        <div class="metric-sub" id="stat-stagedagen-sub">laden...</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Uren deze week</div>
        <div class="metric-value" id="stat-uren-value">—</div>
        <div class="metric-bar-wrap"><div class="metric-bar bar-orange" id="stat-uren-bar" style="width:0%"></div></div>
        <div class="metric-sub" id="stat-uren-sub">laden...</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Logboeken</div>
        <div class="metric-value" id="stat-logboeken-value">—</div>
        <div class="metric-sub">Weken ingediend</div>
      </div>
    </div>

    <div class="bottom-grid">

      <div class="card">
        <div class="card-title">Stageproces</div>
        <div class="timeline" id="timeline">
          <div class="tl-item"><div class="tl-dot"></div><div class="tl-title">laden...</div></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Logboek deze week</div>
        <table class="logboek-table">
          <tbody id="logboek-tabel">
            <tr><td colspan="2">laden...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script>
const API = 'http://localhost:3000';

document.addEventListener('DOMContentLoaded', async () => {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = 'index.html';
        return;
    }

    try {
        const res = await fetch(`${API}/api/student/dashboard`, {
            headers: { 'Authorization': 'Bearer ' + token }
        });

        if (res.status === 401 || res.status === 403) {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
            return;
        }

        const data = await res.json();
        renderDashboard(data);
    } catch (err) {
        console.error('Fout bij laden dashboard:', err);
    }
});

function renderDashboard({ student, stats, stageproces, logboekDezeWeek }) {
    document.getElementById('welkom-naam').textContent = 'Welkom, ' + student.naam;

    if (stats) {
        const { stagedagen, urenDezeWeek, logboeken, huidigWeekNr } = stats;

        const pctDagen = Math.round((stagedagen.gewerkt / stagedagen.totaal) * 100);
        document.getElementById('stat-stagedagen-value').textContent = `${stagedagen.gewerkt}/${stagedagen.totaal}`;
        document.getElementById('stat-stagedagen-bar').style.width = pctDagen + '%';
        document.getElementById('stat-stagedagen-sub').textContent = `${pctDagen}% voltooid`;

        const pctUren = Math.round((urenDezeWeek.gewerkt / urenDezeWeek.target) * 100);
        document.getElementById('stat-uren-value').textContent = `${urenDezeWeek.gewerkt}/${urenDezeWeek.target}`;
        document.getElementById('stat-uren-bar').style.width = Math.min(pctUren, 100) + '%';
        document.getElementById('stat-uren-sub').textContent = `${urenDezeWeek.resterend}u resterend`;

        document.getElementById('stat-logboeken-value').textContent = `${logboeken.ingediend}/${logboeken.totaal}`;
        document.getElementById('banner-week').textContent = `Volgende stap: logboek week ${huidigWeekNr} indienen`;
    }

    if (stageproces) {
        document.getElementById('timeline').innerHTML = stageproces.map(stap => `
            <div class="tl-item">
                <div class="tl-dot ${stap.voltooid ? 'done' : stap.actief ? 'active' : ''}"></div>
                <div class="tl-title ${stap.actief ? 'active' : ''}">${stap.label}</div>
                <div class="tl-sub">${stap.detail || ''}</div>
            </div>
        `).join('');
    }

    const tabel = document.getElementById('logboek-tabel');
    if (logboekDezeWeek && logboekDezeWeek.length > 0) {
        tabel.innerHTML = logboekDezeWeek.map(dag => {
            const datum = new Date(dag.datum);
            const dagNaam = datum.toLocaleDateString('nl-BE', { weekday: 'long', day: 'numeric', month: 'long' });
            const heeftTaak = !!dag.taken_beschrijving;
            return `
                <tr>
                    <td>
                        <div class="dag-naam">${dagNaam.charAt(0).toUpperCase() + dagNaam.slice(1)}</div>
                        <div class="dag-taak">${dag.taken_beschrijving || 'Nog niet ingevuld'}</div>
                    </td>
                    <td class="badge-col">
                        <span class="badge ${heeftTaak ? 'badge-ok' : 'badge-open'}">${heeftTaak ? 'Ok' : 'Openstaand'}</span>
                    </td>
                </tr>
            `;
        }).join('');
    } else {
        tabel.innerHTML = `<tr><td colspan="2">Nog geen dagen ingevuld deze week.</td></tr>`;
    }
}

document.querySelector('.btn-uitloggen').addEventListener('click', () => {
    localStorage.removeItem('token');
    window.location.href = 'index.html';
});
</script>

</body>
</html>
