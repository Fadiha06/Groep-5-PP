<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EhB StageTool — Aanmelden</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/CSS/Login.css">
</head>
<body>

  <div class="branding">
    <img
      class="branding__logo"
      src="/src/Images/EhB-logo-transparant.png"
      alt="Erasmushogeschool Brussel"
    />
  </div>

  <div class="card">
    <div class="card__header">
      <span class="card__header-title">Aanmelden</span>
      <span class="card__header-desc">Log in met je EhB-account of externe credentials.</span>
    </div>

    <div class="tabs">
      <button class="tab tab--active" onclick="switchTab(this, 'ehb')">EhB-account</button>
      <button class="tab" onclick="switchTab(this, 'extern')">Extern</button>
    </div>

    <div class="form" id="tab-ehb">
      <div class="form__group">
        <label class="form__label" for="email">EhB e-mailadres</label>
        <input class="form__input" type="email" id="email" placeholder="voornaam.naam@student.ehb.be" />
      </div>
      <div class="form__group">
        <label class="form__label" for="password">Wachtwoord</label>
        <input class="form__input" type="password" id="password" placeholder="Je EhB-wachtwoord" />
      </div>
      <a href="Wachtwoordvergeten.html" class="form__forgot">Wachtwoord vergeten?</a>
      <button class="btn-submit" type="button">Inloggen</button>
      <div class="info">
        <p>Studenten en medewerkers loggen in met hun <span class="highlight">EhB-account</span></p>
        <p>Stagementoren gebruiken het tabblad <span class="accent">Extern</span>.</p>
      </div>
    </div>

    <div class="form" id="tab-extern" style="display:none;">
      <div class="form__group">
        <label class="form__label" for="ext-email">E-mailadres</label>
        <input class="form__input" type="email" id="ext-email" placeholder="jouw@bedrijf.be" />
      </div>
      <div class="form__group">
        <label class="form__label" for="ext-password">Wachtwoord</label>
        <input class="form__input" type="password" id="ext-password" placeholder="Je wachtwoord" />
      </div>
      <a href="Wachtwoordvergeten.html" class="form__forgot">Wachtwoord vergeten?</a>
      <button class="btn-submit" type="button">Inloggen</button>
      <div class="info">
        <p>Stagementoren en externe partijen loggen in met hun <span class="highlight">extern account</span>.</p>
      </div>
    </div>
  </div>

  <script>
    function switchTab(el, tabId) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab--active'));
      el.classList.add('tab--active');
      document.getElementById('tab-ehb').style.display = tabId === 'ehb' ? 'block' : 'none';
      document.getElementById('tab-extern').style.display = tabId === 'extern' ? 'block' : 'none';
    }

    // Loginknop EhB koppelen aan de backend
  document.querySelector('#tab-ehb .btn-submit').addEventListener('click', async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('http://localhost:3000/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        alert('Ingelogd als ' + data.user.naam + ' (' + data.user.rol + ')');
      } else {
        alert(data.error);
      }
    } catch (err) {
      alert('Kan geen verbinding maken met de server. Draait de backend?');
    }
  });
  </script>
  

</body>
</html>
