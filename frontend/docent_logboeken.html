<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logboeken — EhB StageTool</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/CSS/docent_logboeken.css">
</head>
<body>
<div class="root">

  <nav class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-title">EhB StageTool</div>
      <div class="sb-logo-sub">Toegepaste Informatica</div>
    </div>
    <div class="sb-nav">
      <a class="sb-item" href="docent_dashboard.html">Docent Dashboard</a>
      <a class="sb-item" href="docent_studentendossiers.html">Overzicht Studenten</a>
      <a class="sb-item active" href="#">Logboeken</a>
      <a class="sb-item" href="docent_evaluaties.html">Evaluaties</a>
    </div>
    <div class="sb-footer">Ingelogd als Docent</div>
  </nav>

  <div class="main">
    <div>
      <div class="page-title">Logboeken</div>
      <div class="page-sub">Bekijk alle ingediende logboeken van je studenten.</div>
    </div>

    <div class="card">
      <div class="card-toolbar">
        <div class="card-toolbar-title">Logboeken overzicht</div>
        <div class="search-wrap">
          <span>🔍</span>
          <input class="search" type="text" placeholder="Zoek student..." oninput="filterTable()">
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Student</th>
            <th>Week</th>
            <th>Ingediend op</th>
            <th>Status</th>
            <th>Acties</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="5" style="text-align:center;color:#9CA3AF;padding:24px">Laden...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal (alleen-lezen) -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-header-title" id="modal-title">Logboek</div>
        <div class="modal-header-sub" id="modal-sub"></div>
      </div>
      <div class="modal-header-right">
        <span class="badge-goedgekeurd" id="modal-badge"></span>
        <button class="btn-sluit" onclick="closeModal()">×</button>
      </div>
    </div>
    <div class="modal-body" id="modal-body-content"></div>
  </div>
</div>

<script src="src/JS/api.js"></script>
<script src="src/JS/docent_logboeken.js"></script>
</body>
</html>
