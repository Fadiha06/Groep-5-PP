<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logboeken — EhB StageTool</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/frontend/src/CSS/docent_logboeken.css">
<style>
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:12px;width:820px;max-width:95vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:5px 10px 30px rgba(0,0,0,0.3)}
.modal-header{background:#F8FAFC;border-bottom:0.8px solid #E2E8F0;padding:22px 24px;display:flex;align-items:flex-start;justify-content:space-between}
.modal-header-title{font-size:18px;font-weight:700;color:#1E293B}
.modal-header-sub{font-size:13px;color:#64748B;margin-top:4px}
.modal-header-right{display:flex;align-items:center;gap:12px}
.badge-goedgekeurd{background:#DCFCE7;color:#166534;border:0.8px solid #86EFAC;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px}
.btn-sluit{background:none;border:none;font-size:22px;color:#94A3B8;cursor:pointer;padding:0;line-height:1}
.btn-sluit:hover{color:#374151}
.modal-body{overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.dag-card{background:white;border-radius:8px;border:0.8px solid #E2E8F0;overflow:hidden}
.dag-header{background:#F1F5F9;border-bottom:0.8px solid #E2E8F0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.dag-naam{font-size:14px;font-weight:600;color:#0F172A}
.uren-badge{background:#DBEAFE;color:#2563EB;font-size:12px;font-weight:700;padding:3px 10px;border-radius:4px}
.dag-body{padding:16px}
.dag-sectie{margin-bottom:14px}
.dag-sectie:last-child{margin-bottom:0}
.dag-label{font-size:13px;font-weight:700;color:#1E293B;margin-bottom:4px}
.dag-tekst{font-size:13px;color:#475569;line-height:1.6}
.competentie-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.comp-tag{background:#F8FAFC;color:#334155;font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:0.8px solid #CBD5E1}
.modal-footer{background:#F8FAFC;border-top:0.8px solid #E2E8F0;padding:14px 24px;display:flex;justify-content:flex-end;gap:10px}
.btn-goedkeuren{padding:9px 20px;border-radius:8px;border:none;background:#10B981;color:white;font-size:13px;font-weight:600;cursor:pointer}
.btn-goedkeuren:hover{background:#059669}
.btn-feedback{padding:9px 20px;border-radius:8px;border:0.8px solid #E5E7EB;background:white;color:#374151;font-size:13px;font-weight:500;cursor:pointer}
.btn-feedback:hover{background:#F9FAFB}
</style>
</head>
<body>
<div class="root">

  <nav class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-title">EhB StageTool</div>
      <div class="sb-logo-sub">Toegepaste Informatica</div>
    </div>
    <div class="sb-nav">
      <a class="sb-item" href="docent_dashboard.html">Docent Dashboard</a>
      <a class="sb-item" href="overzicht_studenten.html">Overzicht Studenten</a>
      <a class="sb-item active" href="#">Logboeken</a>
      <a class="sb-item" href="#">Evaluaties</a>
    </div>
    <div class="sb-footer">Ingelogd als Docent</div>
  </nav>

  <div class="main">
    <div>
      <div class="page-title">Logboeken</div>
      <div class="page-sub">Bekijk alle ingediende logboeken van je studenten.</div>
    </div>

    <div class="card">
      <div class="card-toolbar">
        <div class="card-toolbar-title">Logboeken overzicht</div>
        <div class="search-wrap">
          <span>🔍</span>
          <input class="search" type="text" placeholder="Zoek student..." oninput="filterTable()">
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Student</th>
            <th>Week</th>
            <th>Ingediend op</th>
            <th>Status</th>
            <th>Acties</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="5" style="text-align:center;color:#9CA3AF;padding:24px">Laden...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-header-title" id="modal-title">Logboek</div>
        <div class="modal-header-sub" id="modal-sub"></div>
      </div>
      <div class="modal-header-right">
        <span class="badge-goedgekeurd" id="modal-badge"></span>
        <button class="btn-sluit" onclick="closeModal()">×</button>
      </div>
    </div>
    <div class="modal-body" id="modal-body-content"></div>
    <div class="feedback-sectie" id="feedback-sectie" style="display:none;padding:0 24px 16px">
      <div class="dag-label" style="margin-bottom:6px">Feedback voor de student:</div>
      <textarea id="feedback-tekst" placeholder="Schrijf hier je feedback..." style="width:100%;min-height:80px;padding:10px 12px;border-radius:8px;border:0.8px solid #E2E8F0;font-family:inherit;font-size:13px;resize:vertical"></textarea>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">
        <button class="btn-feedback" onclick="annuleerFeedback()">Annuleren</button>
        <button class="btn-goedkeuren" onclick="verstuurFeedback()">Verstuur feedback</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-feedback" id="btn-feedback" onclick="geefFeedback()">Feedback geven</button>
      <button class="btn-goedkeuren" id="btn-goedkeuren" onclick="goedkeuren()">✓ Goedkeuren</button>
    </div>
  </div>
</div>

<script src="/frontend/src/JS/api.js"></script>
<script src="/frontend/src/JS/docent_logboeken.js"></script>
</body>
</html>
