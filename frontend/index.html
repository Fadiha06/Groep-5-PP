<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — EhB StageTool</title>
<style>
  body { font-family: Inter, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
  .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.1); width: 360px; }
  h2 { margin: 0 0 24px; font-size: 20px; }
  input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; margin-bottom: 12px; }
  button { width: 100%; padding: 12px; background: #e63946; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
  button:hover { background: #c1121f; }
  .error { color: red; font-size: 13px; margin-top: 8px; display: none; }
</style>
</head>
<body>
<div class="box">
  <h2>EhB StageTool — Inloggen</h2>
  <input type="email" id="email" placeholder="E-mailadres" />
  <input type="password" id="wachtwoord" placeholder="Wachtwoord" />
  <button onclick="login()">Inloggen</button>
  <div class="error" id="error">Ongeldige gegevens</div>
</div>

<script>
const API = 'http://localhost:3000';

async function login() {
  const email = document.getElementById('email').value;
  const wachtwoord = document.getElementById('wachtwoord').value;

  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, wachtwoord })
    });

    if (res.ok) {
      const data = await res.json();
      localStorage.setItem('token', data.token);
      window.location.href = 'student_dashboard.html';
    } else {
      document.getElementById('error').style.display = 'block';
    }
  } catch (err) {
    document.getElementById('error').textContent = 'Kan geen verbinding maken met de server';
    document.getElementById('error').style.display = 'block';
  }
}
</script>
</body>
</html>
