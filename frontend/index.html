<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EhB StageTool — Aanmelden (test)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F8FAFC; color: #1E293B; display: flex; justify-content: center; padding: 60px 16px; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,.08); padding: 32px; max-width: 420px; width: 100%; }
        h1 { font-size: 22px; margin: 0 0 4px; }
        p.sub { color: #64748B; font-size: 14px; margin: 0 0 24px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        input { width: 100%; padding: 11px 14px; border: 1.5px solid #E2E8F0; border-radius: 6px; font-size: 15px; font-family: inherit; margin-bottom: 16px; box-sizing: border-box; }
        input:focus { outline: none; border-color: #3B82F6; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #D1193E; color: #fff; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; }
        button:hover { opacity: .9; }
        .melding { margin-top: 16px; padding: 12px; border-radius: 6px; font-size: 14px; display: none; }
        .ok { background: #F0FDF4; border: 1px solid #BBF7D0; color: #15803D; }
        .fout { background: #FEF2F2; border: 1px solid #FECACA; color: #B91C1C; }
        .links { margin-top: 20px; display: none; }
        .links a { display: inline-block; color: #3B82F6; font-size: 14px; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Aanmelden</h1>
        <p class="sub">Test-login voor de StageTool.</p>

        <label for="email">E-mailadres</label>
        <input type="email" id="email" value="student@test.be">

        <label for="password">Wachtwoord</label>
        <input type="password" id="password" value="test123">

        <button id="btn-login">Inloggen</button>

        <div class="melding ok" id="melding-ok"></div>
        <div class="melding fout" id="melding-fout"></div>

        <div class="links" id="links">
            <a href="contract.html">→ Naar het stagecontract</a>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000/api';

        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const okEl = document.getElementById('melding-ok');
            const foutEl = document.getElementById('melding-fout');
            okEl.style.display = 'none';
            foutEl.style.display = 'none';

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('rol', data.rol);
                    localStorage.setItem('userId', data.userId);
                    okEl.textContent = 'Ingelogd ✓ (rol: ' + data.rol + ')';
                    okEl.style.display = 'block';
                    document.getElementById('links').style.display = 'block';
                } else {
                    foutEl.textContent = data.error || 'Inloggen mislukt';
                    foutEl.style.display = 'block';
                }
            } catch (e) {
                foutEl.textContent = 'Kan geen verbinding maken met de server. Draait de backend op poort 5000?';
                foutEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
