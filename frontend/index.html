<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EhB StageTool Aanmelden</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/CSS/login.css">
</head>
<body>

  <div class="branding">
    <img
      class="branding__logo"
      src="src/Images/EhB-logo-transparant.png"
      alt="Erasmushogeschool Brussel"
    />
  </div>

  <div class="card">
    <div class="card__header">
      <span class="card__header-title">Aanmelden</span>
      <span class="card__header-desc">Log in met je EhB-account.</span>
    </div>

    <div class="form" id="tab-ehb">
      <div class="form__group">
        <label class="form__label" for="email">EhB e-mailadres</label>
        <input class="form__input" type="email" id="email" placeholder="voornaam.naam@student.ehb.be" />
      </div>
      <div class="form__group">
        <label class="form__label" for="password">Wachtwoord</label>
        <input class="form__input" type="password" id="password" placeholder="Je EhB-wachtwoord" />
      </div>
      <a href="Wachtwoordvergeten.html" class="form__forgot">Wachtwoord vergeten?</a>
      <button class="btn-submit" type="button">Inloggen</button>
      <div class="info">
        <p>Studenten en medewerkers loggen in met hun <span class="highlight">EhB-account</span>.</p>
      </div>
    </div>
  </div>

  <script src="src/JS/api.js"></script>
  <script src="src/JS/login.js"></script>
  

</body>
</html>
