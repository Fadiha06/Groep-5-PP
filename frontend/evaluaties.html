<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluaties — EhB StageTool</title>
<link rel="stylesheet" href="src/CSS/shared_sidebar.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/CSS/evaluaties.css">
</head>
<body>
<div class="root">

    <nav class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-title">EhB StageTool</div>
      <div class="sb-logo-sub">Toegepaste Informatica</div>
    </div>
    <div class="sb-nav">
      <a class="sb-item" href="student_dashboard.html">Dashboard</a>
      <a class="sb-item" href="student_voorstel_response.html">Mijn stage</a>
      <a class="sb-item" href="logboek.html">Logboek</a>
      <a class="sb-item" href="contract.html">Contract</a>
      <a class="sb-item active" href="evaluaties.html">Evaluaties</a>
    </div>
    <div class="sb-footer">Ingelogd als Student</div>
  </nav>

  <div class="main">
    <div>
      <div class="page-title">Evaluaties & feedback</div>
      <div class="page-sub">Overzicht van alle beoordelingen van je stage door docent en stagementor.</div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('tussent', this)">Tussentijdse evaluatie</div>
      <div class="tab" onclick="switchTab('finaal', this)">Finale evaluatie</div>
    </div>

    <div class="tab-content active" id="tab-tussent">
      <div id="tussent-inhoud"><div style="padding:32px;color:#5A6A7E">Laden...</div></div>
    </div>

    <div class="tab-content" id="tab-finaal">
      <div id="finaal-inhoud"><div style="padding:32px;color:#5A6A7E">Laden...</div></div>
    </div>
  </div>
</div>

<script src="src/JS/api.js"></script>
<script>
const API = '';

// Guard: contract moet volledig getekend zijn
document.addEventListener('DOMContentLoaded', async function() {
    if (!requireAuth('student')) return;
    const contract = await vereisContractGetekend();
    if (!contract) return;
    laadEvaluaties();
});

function getToken() {
  return localStorage.getItem('token');
}

function uitloggen() {
  localStorage.removeItem('token');
  window.location.href = 'index.html';
}

function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}

function scoreKleur(score) {
  if (score >= 4) return 'bar-groen';
  if (score >= 2) return 'bar-blauw';
  return 'bar-rood';
}

function scoreBadge(score) {
  if (score >= 4) return 'score-5';
  if (score >= 2) return 'score-2';
  return 'score-1';
}

function initialen(naam) {
  return naam.split(' ').filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase();
}

function formatDatum(datum) {
  if (!datum) return '';
  const d = new Date(datum);
  return d.toLocaleDateString('nl-BE', { day: 'numeric', month: 'long', year: 'numeric' });
}

function renderEvalCard(evaluatie, competenties) {
  const avatar = evaluatie.beoordelaar_rol === 'docent' ? 'avatar-blauw' : 'avatar-grijs';
  const rol = evaluatie.beoordelaar_rol === 'docent' ? 'Verantwoordelijk docent' : 'Stagementor';
  const init = initialen(evaluatie.beoordelaar_naam || '??');

  const compRijen = competenties
    .filter(c => c.beoordelaar_rol === evaluatie.beoordelaar_rol)
    .map(c => `
      <div class="competentie-rij">
        <div>
          <div class="comp-naam">${c.competentie_naam}</div>
          <div class="comp-comment">"${c.commentaar || ''}"</div>
        </div>
        <div class="comp-score-wrap">
          <div class="comp-score ${scoreBadge(c.score)}">${c.score}</div>
          <div class="score-bar-wrap">
            <div class="score-bar ${scoreKleur(c.score)}" style="width:${(c.score / 5) * 100}%"></div>
          </div>
        </div>
      </div>`).join('');

  return `
    <div class="eval-card">
      <div class="eval-header">
        <div style="display:flex;align-items:center">
          <div class="eval-avatar ${avatar}">${init}</div>
          <div style="margin-left:12px">
            <div class="eval-naam">${evaluatie.beoordelaar_naam}</div>
            <div class="eval-rol">${rol} — Ingediend op ${formatDatum(evaluatie.datum)}</div>
          </div>
        </div>
        <span class="badge-ontvangen">✓ Ontvangen</span>
      </div>
      <div class="eval-body">
        <div class="feedback-quote">${evaluatie.feedback || ''}</div>
        ${compRijen ? `<div class="competenties-label">Gedetailleerde competentiescores</div><div>${compRijen}</div>` : ''}
      </div>
    </div>`;
}

function renderSamenvatting(data, typeLabel) {
  if (!data || !data.competenties || data.competenties.length === 0) return '';

  const alleComps = data.competenties;
  const uniqueNames = [...new Set(alleComps.map(c => c.competentie_naam))];
  const rubrieken = data.rubrieken || [];

  const mentorEvals = (data.evaluaties || []).find(e => e.beoordelaar_rol === 'mentor' || e.beoordelaar_rol === 'stagementor');

  let totaalScore = 0;

  const rijen = uniqueNames.map(naam => {
    const comp = alleComps.find(c => c.competentie_naam === naam);
    const score = comp ? parseFloat(comp.score) : null;
    const commentaar = comp ? comp.commentaar : null;
    if (score !== null && !isNaN(score)) totaalScore += score;
    const pct = score !== null ? (score / 5) * 100 : 0;
    const kleur = score >= 4 ? '#27AE60' : score >= 2 ? '#3B82F6' : '#EF4444';

    const rubriekMatch = score !== null ? rubrieken.find(r => r.competentie_id === comp.competentie_id && r.punten === Math.round(score)) : null;
    const niveauLabel = rubriekMatch ? rubriekMatch.omschrijving : '';

    return `
      <div class="comp-eval-blok">
        <div class="comp-eval-rij">
          <div class="comp-eval-naam">${naam}</div>
          <div class="comp-eval-bar-wrap">
            <div class="comp-eval-bar" style="width:${pct}%;background:${kleur}"></div>
          </div>
          <div class="comp-eval-score" style="color:${kleur}">${score !== null ? score : '—'}<span class="comp-eval-max"> / 5</span></div>
        </div>
        ${niveauLabel ? `<div class="comp-eval-niveau" style="color:${kleur}">${niveauLabel}</div>` : ''}
        ${commentaar ? `<div class="comp-eval-comment">${commentaar}</div>` : ''}
      </div>`;
  }).join('');

  const feedbackTekst = mentorEvals && mentorEvals.feedback ? mentorEvals.feedback : null;
  const weken = data.aantalWeken || 0;
  const subTekst = weken > 0
    ? `Gemiddelde over ${weken} week${weken !== 1 ? 'en' : ''}`
    : '';

  return `
    <div class="eval-card">
      <div class="eval-header">
        <div>
          <div class="eval-naam">${typeLabel}</div>
          <div class="eval-rol">${subTekst}</div>
        </div>
        <span class="badge-ontvangen">✓ Ontvangen</span>
      </div>
      <div class="eval-body">
        <div class="comp-eval-lijst">${rijen}</div>
        <div class="comp-eval-totaal">
          <span>Totaal</span>
          <span class="comp-eval-totaal-score">${Math.round(totaalScore * 10) / 10} <span class="comp-eval-max">/ 20</span></span>
        </div>
        ${feedbackTekst ? `
        <div class="feedback-sectie">
          <div class="feedback-sectie-titel">Algemene feedback</div>
          <div class="feedback-sectie-tekst">${feedbackTekst}</div>
        </div>` : ''}
      </div>
    </div>`;
}

function renderTussentijds(data) {
  const container = document.getElementById('tussent-inhoud');
  const heeftScores = data && data.competenties && data.competenties.some(c => c.score !== null && c.score !== undefined);
  if (!heeftScores) {
    container.innerHTML = `
      <div class="eval-card">
        <div class="eval-body" style="padding:48px 32px;text-align:center;align-items:center">
          <div style="font-size:40px">⏳</div>
          <div style="font-size:16px;font-weight:700;color:#1A3C6E">Nog geen tussentijdse evaluatie ontvangen</div>
          <div style="font-size:13px;color:#5A6A7E;max-width:380px;line-height:1.7">Je ontvangt een melding zodra de evaluatie beschikbaar is.</div>
        </div>
      </div>`;
    return;
  }

  container.innerHTML = renderSamenvatting(data, 'Tussentijdse evaluatie');
}

function renderFinaal(data) {
  const container = document.getElementById('finaal-inhoud');
  if (!data || !data.evaluaties || data.evaluaties.length === 0) {
    container.innerHTML = `
      <div class="eval-card">
        <div class="eval-body" style="padding:48px 32px;text-align:center;align-items:center">
          <div style="font-size:40px">📋</div>
          <div style="font-size:16px;font-weight:700;color:#1A3C6E">Finale evaluatie nog niet beschikbaar</div>
          <div style="font-size:13px;color:#5A6A7E;max-width:380px;line-height:1.7">De finale evaluatie wordt ingevuld na afloop van je stage. Je ontvangt een melding zodra ze beschikbaar is.</div>
        </div>
      </div>`;
    return;
  }

  container.innerHTML = renderSamenvatting(data, 'Finale evaluatie');
}

async function laadEvaluaties() {
  const token = getToken();
  if (!token) { window.location.href = 'index.html'; return; }

  try {
    const res = await fetch(`/api/studenten/evaluaties`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.status === 401 || res.status === 403) { uitloggen(); return; }
    const data = await res.json();
    renderTussentijds(data.tussentijds);
    renderFinaal(data.finaal);
  } catch (err) {
    document.getElementById('tussent-inhoud').innerHTML = '<div style="padding:32px;color:red">Kon evaluaties niet laden.</div>';
    document.getElementById('finaal-inhoud').innerHTML = '';
  }
}

// laadEvaluaties wordt aangeroepen via de contract guard hierboven
</script>
</body>
</html>
