<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluaties — EhB StageTool</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/VITE/src/CSS/evaluaties.css">
</head>
<body>
<div class="root">

  <nav class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-title">EhB StageTool</div>
      <div class="sb-logo-sub">Toegepaste Informatica</div>
    </div>
    <div class="sb-nav">
      <a class="sb-item" href="student_dashboard.html">Dashboard</a>
      <a class="sb-item" href="logboek.html">Logboek</a>
      <a class="sb-item active" href="evaluaties.html">Evaluaties</a>
    </div>
    <div class="sb-footer" id="sidebar-naam">Ingelogd als Student</div>
  </nav>

  <div class="main">
    <div>
      <div class="page-title">Evaluaties & feedback</div>
      <div class="page-sub">Overzicht van alle beoordelingen van je stage door docent en stagementor.</div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('tussent', this)">Tussentijdse evaluatie</div>
      <div class="tab" onclick="switchTab('finaal', this)">Finale evaluatie</div>
    </div>

    <div class="tab-content active" id="tab-tussent">
      <div id="tussent-inhoud"><div style="padding:32px;color:#5A6A7E">Laden...</div></div>
    </div>

    <div class="tab-content" id="tab-finaal">
      <div id="finaal-inhoud"><div style="padding:32px;color:#5A6A7E">Laden...</div></div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:5000';

function getToken() {
  return localStorage.getItem('token');
}

function uitloggen() {
  localStorage.removeItem('token');
  window.location.href = 'index.html';
}

function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}

function scoreKleur(score) {
  if (score >= 4) return 'bar-groen';
  if (score >= 2) return 'bar-blauw';
  return 'bar-rood';
}

function scoreBadge(score) {
  if (score >= 4) return 'score-5';
  if (score >= 2) return 'score-2';
  return 'score-1';
}

function initialen(naam) {
  return naam.split(' ').filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase();
}

function formatDatum(datum) {
  if (!datum) return '';
  const d = new Date(datum);
  return d.toLocaleDateString('nl-BE', { day: 'numeric', month: 'long', year: 'numeric' });
}

function renderEvalCard(evaluatie, competenties) {
  const avatar = evaluatie.beoordelaar_rol === 'docent' ? 'avatar-blauw' : 'avatar-grijs';
  const rol = evaluatie.beoordelaar_rol === 'docent' ? 'Verantwoordelijk docent' : 'Stagementor';
  const init = initialen(evaluatie.beoordelaar_naam || '??');

  const compRijen = competenties
    .filter(c => c.beoordelaar_rol === evaluatie.beoordelaar_rol)
    .map(c => `
      <div class="competentie-rij">
        <div>
          <div class="comp-naam">${c.competentie_naam}</div>
          <div class="comp-comment">"${c.commentaar || ''}"</div>
        </div>
        <div class="comp-score-wrap">
          <div class="comp-score ${scoreBadge(c.score)}">${c.score}</div>
          <div class="score-bar-wrap">
            <div class="score-bar ${scoreKleur(c.score)}" style="width:${(c.score / 5) * 100}%"></div>
          </div>
        </div>
      </div>`).join('');

  return `
    <div class="eval-card">
      <div class="eval-header">
        <div style="display:flex;align-items:center">
          <div class="eval-avatar ${avatar}">${init}</div>
          <div style="margin-left:12px">
            <div class="eval-naam">${evaluatie.beoordelaar_naam}</div>
            <div class="eval-rol">${rol} — Ingediend op ${formatDatum(evaluatie.datum)}</div>
          </div>
        </div>
        <span class="badge-ontvangen">✓ Ontvangen</span>
      </div>
      <div class="eval-body">
        <div class="feedback-quote">${evaluatie.feedback || ''}</div>
        ${compRijen ? `<div class="competenties-label">Gedetailleerde competentiescores</div><div>${compRijen}</div>` : ''}
      </div>
    </div>`;
}

function renderTussentijds(data) {
  const container = document.getElementById('tussent-inhoud');
  if (!data || !data.evaluaties || data.evaluaties.length === 0) {
    container.innerHTML = `
      <div class="eval-card">
        <div class="eval-body" style="padding:48px 32px;text-align:center;align-items:center">
          <div style="font-size:40px">⏳</div>
          <div style="font-size:16px;font-weight:700;color:#1A3C6E">Nog geen tussentijdse evaluatie ontvangen</div>
          <div style="font-size:13px;color:#5A6A7E;max-width:380px;line-height:1.7">Je ontvangt een melding zodra de evaluatie beschikbaar is.</div>
        </div>
      </div>`;
    return;
  }

  const aantalComp = data.competenties ? data.competenties.length : 0;
  const metrics = `
    <div class="metrics">
      <div class="metric-card">
        <div class="metric-label">Evaluaties ontvangen</div>
        <div class="metric-value">${data.evaluaties.length}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Competenties beoordeeld</div>
        <div class="metric-value">${aantalComp}</div>
      </div>
    </div>`;

  const kaarten = data.evaluaties.map(e => renderEvalCard(e, data.competenties || [])).join('');
  container.innerHTML = metrics + kaarten;
}

function renderFinaal(data) {
  const container = document.getElementById('finaal-inhoud');
  if (!data || !data.evaluaties || data.evaluaties.length === 0) {
    container.innerHTML = `
      <div class="eval-card">
        <div class="eval-body" style="padding:48px 32px;text-align:center;align-items:center">
          <div style="font-size:40px">📋</div>
          <div style="font-size:16px;font-weight:700;color:#1A3C6E">Finale evaluatie nog niet beschikbaar</div>
          <div style="font-size:13px;color:#5A6A7E;max-width:380px;line-height:1.7">De finale evaluatie wordt ingevuld na afloop van je stage. Je ontvangt een melding zodra ze beschikbaar is.</div>
        </div>
      </div>`;
    return;
  }

  const aantalComp = data.competenties ? data.competenties.length : 0;
  const metrics = `
    <div class="metrics">
      <div class="metric-card">
        <div class="metric-label">Evaluaties ontvangen</div>
        <div class="metric-value">${data.evaluaties.length}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Competenties beoordeeld</div>
        <div class="metric-value">${aantalComp}</div>
      </div>
    </div>`;

  const kaarten = data.evaluaties.map(e => renderEvalCard(e, data.competenties || [])).join('');
  container.innerHTML = metrics + kaarten;
}

async function laadEvaluaties() {
  const token = getToken();
  if (!token) { window.location.href = 'index.html'; return; }

  try {
    const res = await fetch(`${API}/api/student/evaluaties`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.status === 401 || res.status === 403) { uitloggen(); return; }
    const data = await res.json();
    renderTussentijds(data.tussentijds);
    renderFinaal(data.finaal);
  } catch (err) {
    document.getElementById('tussent-inhoud').innerHTML = '<div style="padding:32px;color:red">Kon evaluaties niet laden.</div>';
    document.getElementById('finaal-inhoud').innerHTML = '';
  }
}

document.addEventListener('DOMContentLoaded', laadEvaluaties);
</script>
</body>
</html>
