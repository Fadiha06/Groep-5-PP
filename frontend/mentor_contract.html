<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract ondertekenen — Stagementor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F8FAFC; color: #1E293B; display: flex; justify-content: center; padding: 40px 16px; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,.08); padding: 28px 32px; max-width: 560px; width: 100%; }
        h1 { font-size: 22px; margin: 0 0 6px; }
        p.sub { color: #64748B; font-size: 14px; margin: 0 0 20px; }
        .label { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .canvas-wrap { border: 1.5px dashed #CBD5E1; border-radius: 8px; background: #fff; }
        canvas { display: block; width: 100%; height: 160px; touch-action: none; }
        .actions { display: flex; gap: 10px; margin-top: 12px; }
        button { font-family: inherit; font-size: 14px; font-weight: 600; padding: 10px 18px; border-radius: 6px; border: none; cursor: pointer; }
        .btn-wis { background: #fff; border: 1.5px solid #E2E8F0; color: #64748B; }
        .btn-primary { background: #D1193E; color: #fff; }
        .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
        .melding { margin-top: 16px; padding: 14px; border-radius: 6px; font-size: 14px; display: none; }
        .ok { background: #F0FDF4; border: 1px solid #BBF7D0; color: #15803D; }
        .fout { background: #FEF2F2; border: 1px solid #FECACA; color: #B91C1C; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Stagecontract ondertekenen</h1>
        <p class="sub">Je tekent als <strong>stagementor</strong>. Zet hieronder je handtekening en bevestig.</p>

        <div class="label">✎ Teken hieronder</div>
        <div class="canvas-wrap"><canvas id="sig-canvas"></canvas></div>
        <div class="actions">
            <button class="btn-wis" id="btn-wis">Wissen</button>
            <button class="btn-primary" id="btn-teken">Ondertekenen</button>
        </div>

        <div class="melding ok" id="melding-ok">✓ Bedankt! Het contract is door jou ondertekend.</div>
        <div class="melding fout" id="melding-fout"></div>
    </div>

    <script>
        const API = 'http://localhost:5000/api';
        const params = new URLSearchParams(window.location.search);
        const mentorToken = params.get('token');

        const canvas = document.getElementById('sig-canvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            const ratio = window.devicePixelRatio || 1;
            const w = canvas.clientWidth, h = 160;
            canvas.width = w * ratio; canvas.height = h * ratio;
            ctx.scale(ratio, ratio);
            ctx.strokeStyle = '#1E40AF'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        }
        resizeCanvas();

        let drawing = false, hasSig = false;
        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            const s = e.touches ? e.touches[0] : e;
            return { x: s.clientX - r.left, y: s.clientY - r.top };
        }
        canvas.addEventListener('mousedown', e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('mousemove', e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasSig = true; });
        canvas.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mouseleave', () => drawing = false);
        canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
        canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasSig = true; }, { passive: false });
        canvas.addEventListener('touchend', () => drawing = false);

        document.getElementById('btn-wis').addEventListener('click', resizeCanvas);

        document.getElementById('btn-teken').addEventListener('click', async () => {
            const foutEl = document.getElementById('melding-fout');
            foutEl.style.display = 'none';
            if (!mentorToken) { foutEl.textContent = 'Ongeldige link (geen token).'; foutEl.style.display = 'block'; return; }
            if (!hasSig) { foutEl.textContent = 'Teken eerst je handtekening.'; foutEl.style.display = 'block'; return; }
            const signatureBase64 = canvas.toDataURL('image/png');
            try {
                const res = await fetch(`${API}/contracten/mentor-tekenen`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: mentorToken, signature: signatureBase64 })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('melding-ok').style.display = 'block';
                    document.getElementById('btn-teken').disabled = true;
                } else {
                    foutEl.textContent = data.error || 'Fout bij ondertekenen'; foutEl.style.display = 'block';
                }
            } catch (e) {
                foutEl.textContent = 'Netwerkfout. Draait de server?'; foutEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
