<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EhB StageTool — Evaluaties</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="src/CSS/docent_evaluaties.css" />
</head>
<body>
<div class="root">

    <aside class="sidebar">
        <div class="sb-logo">
            <div class="sb-logo-title">EhB StageTool</div>
            <div class="sb-logo-sub">Toegepaste Informatica</div>
        </div>
        <div class="sb-nav">
            <a href="docent_dashboard.html" class="sb-item">Docent Dashboard</a>
            <a href="docent_studentendossiers.html" class="sb-item">Overzicht Studenten</a>
            <a href="docent_logboeken.html" class="sb-item">Logboeken</a>
            <a href="#" class="sb-item active">Evaluaties</a>
        </div>
        <div class="sb-footer">Ingelogd als Docent</div>
    </aside>

    <main class="main">
        <div class="eval-header-title" id="eval-titel">Evaluaties</div>
        <div class="eval-header-sub">Beoordeel en score de competenties van je studenten per week.</div>

        <div class="content-grid">

            <!-- Student lijst -->
            <div class="student-list-card">
                <div class="student-list-search">
                    <div class="student-list-label">Studenten</div>
                    <input class="search" type="text" placeholder="Zoek student..." oninput="filterStudents()" />
                </div>
                <div class="student-items" id="student-items">
                    <div style="padding:20px;text-align:center;color:#9CA3AF;font-size:12px">Laden...</div>
                </div>
            </div>

            <!-- Evaluatie panel -->
            <div>
                <div class="eval-toolbar">
                    <div class="week-tabs" id="week-tabs"></div>
                    <div class="legenda">
                        <div class="legenda-item"><div class="legenda-dot dot-student"></div> Student</div>
                        <div class="legenda-item"><div class="legenda-dot dot-mentor"></div> Mentor</div>
                        <div class="totaal-badge" id="totaal-badge">Totaal: — / —</div>
                    </div>
                </div>

                <div id="competenties-container" style="margin-top:16px">
                    <div style="padding:30px;text-align:center;color:#9CA3AF;font-size:13px">Selecteer een student om te beginnen.</div>
                </div>

                <div class="save-row" style="margin-top:16px">
                    <button class="btn-opslaan" id="btn-opslaan" onclick="opslaanScore()">Opslaan score</button>
                </div>
            </div>

        </div>
    </main>

</div>

<script src="src/JS/api.js"></script>
<script src="src/JS/docent_evaluaties.js"></script>
</body>
</html>
