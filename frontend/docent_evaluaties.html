<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluaties — Docent — EhB StageTool</title>
    <link rel="stylesheet" href="src/CSS/shared_sidebar.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/CSS/docent_evaluaties.css">
</head>
<body>
<div class="root">

      <nav class="sidebar">
        <div class="sb-logo">
            <div class="sb-logo-title">EhB StageTool</div>
            <div class="sb-logo-sub">Toegepaste Informatica</div>
        </div>
        <div class="sb-nav">
            <a class="sb-item" href="docent_dashboard.html">Docent Dashboard</a>
            <a class="sb-item" href="overzicht_studenten.html">Overzicht Studenten</a>
            <a class="sb-item" href="docent_logboeken.html">Logboeken</a>
            <a class="sb-item active" href="docent_evaluaties.html">Evaluaties</a>
        </div>
        <div class="sb-footer">Ingelogd als Docent</div>
    </nav>

  <div class="main">

    <div class="content-grid">

      <!-- Studentenlijst -->
      <div class="student-list-card">
        <div class="student-list-search">
          <div class="student-list-label">Studenten</div>
          <input class="search" type="text" placeholder="Zoek student..." oninput="filterStudents()">
        </div>
        <div class="student-items" id="student-items">
          <div style="padding:16px;font-size:12px;color:#9CA3AF">Laden...</div>
        </div>
      </div>

      <!-- Evaluatie paneel -->
      <div style="display:flex;flex-direction:column;gap:14px">

        <div>
          <div class="eval-header-title" id="eval-titel">Samengebrachte score</div>
          <div class="eval-header-sub">Beoordeel de competenties per week. Klik op een scorekolom om te selecteren.</div>
        </div>

        <div class="eval-toolbar">
          <div class="week-tabs" id="week-tabs"></div>
          <div class="legenda">
            <div class="legenda-item"><span class="legenda-dot dot-student"></span> Student</div>
            <div class="legenda-item"><span class="legenda-dot dot-mentor"></span> Mentor</div>
            <div class="totaal-badge" id="totaal-badge">Totaal: — / —</div>
          </div>
        </div>

        <div>
          <div style="font-size:12px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:4px">Logboek per week</div>
          <div class="week-selector" id="week-selector">
            <span style="font-size:12px;color:#9CA3AF">Laden...</span>
          </div>
          <div id="mentor-feedback-container"></div>
        </div>

        <div id="competenties-container">
          <div style="padding:30px;text-align:center;color:#9CA3AF;font-size:13px">Laden...</div>
        </div>

        <div class="save-row">
          <button class="btn-opslaan" id="btn-opslaan" onclick="opslaanScore()">Opslaan score</button>
          <button class="btn-toon" id="btn-toon-student" onclick="toggleToonStudent()" style="display:none"></button>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="src/JS/api.js"></script>
<script src="src/JS/docent_evaluaties.js"></script>
</body>
</html>
