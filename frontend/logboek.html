<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EhB StageTool — Logboek</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="src/CSS/logboek.css" />
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar__brand">
            <span class="sidebar__brand-name">EhB StageTool</span>
            <span class="sidebar__brand-sub">Toegepaste Informatica</span>
        </div>
        <nav class="sidebar__nav">
            <a href="student_dashboard.html" class="nav-item"><span class="nav-item__icon"></span> Dashboard</a>
            <a href="#" class="nav-item active"><span class="nav-item__icon"></span> Logboek</a>
            <a href="#" class="nav-item"><span class="nav-item__icon"></span> Evaluaties</a>
        </nav>
    </aside>

    <main class="main">

        <div class="page-header">
            <h1>Dagelijks Logboek</h1>
            <p>Vul hier je dagelijkse reflecties en activiteiten in</p>
        </div>

        <div class="card">
            <div class="stage-info">
                <div>
                    <div class="stage-info__title" id="stage-titel">Laden...</div>
                    <div class="stage-meta">
                        <div class="stage-meta__item">📅 <span>Periode: <strong id="stage-periode">—</strong></span></div>
                        <div class="stage-meta__item">👤 <span>Stagementor: <strong id="stage-mentor">—</strong></span></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="content-grid">

            <div class="form-section">
                <div class="card">
                    <div class="form-group">
                        <label for="datum">Datum <span class="required">*</span></label>
                        <input type="date" id="datum" required />
                    </div>
                    <br />
                    <div class="form-group">
                        <label for="taken">Uitgevoerde taken <span class="required">*</span></label>
                        <textarea id="taken" rows="4" placeholder="Beschrijf de taken die je vandaag hebt uitgevoerd..." required></textarea>
                    </div>
                    <br />
                    <div class="form-group">
                        <label for="reflectie">Reflectie <span class="required">*</span></label>
                        <textarea id="reflectie" rows="4" placeholder="Wat heb je geleerd? Wat vond je moeilijk?" required></textarea>
                    </div>
                    <br />
                    <div class="form-group">
                        <label for="problemen">Problemen of uitdagingen <span class="required">*</span></label>
                        <textarea id="problemen" rows="3" placeholder="Meld eventuele problemen of vragen..." required></textarea>
                    </div>
                    <br />
                    <div class="form-group">
                        <label for="uren">Aantal gewerkte uren <span class="required">*</span></label>
                        <input type="number" id="uren" placeholder="Bijv. 6" min="0" max="24" style="max-width:160px;" required />
                    </div>
                    <br />
                    <div class="form-group">
                        <label>Competenties van vandaag</label>
                        <div id="competenties-lijst">Laden...</div>
                    </div>
                    <br />
                    <div class="form-actions">
                        <button class="btn btn-primary" onclick="slaOp()">Logboek opslaan</button>
                        <button class="btn btn-secondary">Annuleren</button>
                    </div>
                    <div id="feedback-box" class="feedback-box" style="display:none;">
                        ✅ Logboek succesvol opgeslagen!
                    </div>
                </div>
            </div>

            <div class="right-col">
                <div class="card">
                    <div class="card__title">Laatste logboek</div>
                    <div class="last-entry__date" id="laatste-datum">—</div>
                    <div class="last-entry__body" id="laatste-body">
                        <div class="last-entry__row">Nog geen logboek ingevuld.</div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const API = 'http://localhost:3000/api/student';
        const token = localStorage.getItem('token');

        async function laadStageHeader() {
            if (!token) return;
            try {
                const res = await fetch(`${API}/stage-info`, { headers: { 'Authorization': 'Bearer ' + token } });
                if (!res.ok) return;
                const stage = await res.json();
                const opt = { day: 'numeric', month: 'long', year: 'numeric' };
                document.getElementById('stage-titel').textContent = `Stage bij ${stage.bedrijf_naam || '—'}`;
                document.getElementById('stage-periode').textContent =
                    `${new Date(stage.startdatum).toLocaleDateString('nl-BE', opt)} – ${new Date(stage.einddatum).toLocaleDateString('nl-BE', opt)}`;
                document.getElementById('stage-mentor').textContent = '—';
            } catch (err) {
                console.error(err);
            }
        }

        async function laadCompetenties() {
            if (!token) return;
            try {
                const res = await fetch(`${API}/competenties`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) return;
                const lijst = await res.json();
                const box = document.getElementById('competenties-lijst');
                box.innerHTML = lijst.map(c => `
                    <div class="comp-rij">
                        <label>
                            <input type="checkbox" class="comp-check" value="${c.competentie_id}" />
                            ${c.naam}
                        </label>
                        <input type="text" class="comp-comment" data-id="${c.competentie_id}" placeholder="Commentaar (optioneel)..." />
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function laadLaatste() {
            if (!token) return;
            try {
                const res = await fetch(`${API}/logboek/laatste`, { headers: { 'Authorization': 'Bearer ' + token } });
                if (!res.ok) return;
                const dag = await res.json();
                const d = new Date(dag.datum).toLocaleDateString('nl-BE', { day: 'numeric', month: 'long', year: 'numeric' });
                document.getElementById('laatste-datum').textContent = d;
                document.getElementById('laatste-body').innerHTML = `
                    <div class="last-entry__row"><strong>Uitgevoerde taken</strong>${dag.taken_beschrijving || '—'}</div>
                    <div class="last-entry__row"><strong>Reflectie</strong>${dag.reflectie || '—'}</div>
                    <div class="last-entry__row"><strong>Problemen</strong>${dag.leerpunten || '—'}</div>
                    <div class="last-entry__row"><strong>Gewerkte uren</strong>${dag.uren ?? 0} uur</div>
                `;
            } catch (err) {
                console.error(err);
            }
        }

        async function slaOp() {
            const datum = document.getElementById('datum');
            const taken = document.getElementById('taken');
            const reflectie = document.getElementById('reflectie');
            const problemen = document.getElementById('problemen');
            const uren = document.getElementById('uren');

            if (!datum.value || !taken.value || !reflectie.value || !problemen.value || !uren.value) {
                alert('Alle velden zijn verplicht! Vul aub alle velden in.');
                return;
            }
            if (!token) {
                alert('Je bent niet ingelogd.');
                return;
            }

            const competenties = [...document.querySelectorAll('.comp-check:checked')].map(chk => ({
                competentie_id: Number(chk.value),
                commentaar: document.querySelector(`.comp-comment[data-id="${chk.value}"]`).value
            }));

            const data = {
                datum: datum.value,
                taken_beschrijving: taken.value,
                reflectie: reflectie.value,
                leerpunten: problemen.value,
                uren: uren.value,
                competenties
            };

            try {
                const res = await fetch(`${API}/logboek`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (res.ok) {
                    const fb = document.getElementById('feedback-box');
                    fb.style.display = 'block';
                    setTimeout(() => fb.style.display = 'none', 3000);
                    laadLaatste();
                } else {
                    alert(result.error || 'Er ging iets mis');
                }
            } catch (err) {
                alert('Kan geen verbinding maken met de server');
            }
        }

        laadStageHeader();
        laadLaatste();
        laadCompetenties();
    </script>

</body>
</html>
